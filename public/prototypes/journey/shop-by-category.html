<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>doddl · Shop by Category</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: 'Nunito', system-ui, sans-serif;
      background: #FAFAF8;
      color: #26215C;
    }
    header.bar {
      position: sticky; top: 0; z-index: 10;
      height: 56px;
      background: #fff;
      border-bottom: 1px solid #EDE9F6;
      display: flex;
      align-items: center;
      padding: 0 20px;
    }
    .bar .left { flex: 1; }
    .bar .center { flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .bar .right { flex: 1; display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
    .bar a.back {
      font-weight: 700; color: #3D157D; text-decoration: none; font-size: 14px;
    }
    .bar a.back:hover { text-decoration: underline; }
    .bar .logo {
      font-family: 'Nunito', sans-serif; font-weight: 900; color: #3D157D;
      font-size: 22px; line-height: 1;
    }
    .bar .logo .dot { color: #30BEAA; }
    .bar .label { font-size: 12px; font-weight: 700; }
    .toggle { display: flex; gap: 6px; }
    .toggle button {
      font-family: 'Nunito', sans-serif;
      border-radius: 50px;
      padding: 7px 18px;
      font-weight: 800;
      font-size: 12px;
      background: transparent;
      color: #888;
      border: 1px solid #ddd;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .toggle button.active {
      background: #26215C;
      color: #fff;
      border-color: #26215C;
    }
    .meta { font-size: 10px; color: #aaa; }

    .stage {
      width: 100%;
      height: calc(100vh - 56px);
      background: #FAFAF8;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
    }
    .placeholder {
      max-width: 520px;
      margin: 40px 20px;
      padding: 48px 40px;
      text-align: center;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(38,33,92,0.08);
      border: 1px solid #EDE9F6;
    }
    .placeholder .badge {
      display: inline-block;
      background: #E0F5F0;
      color: #0F6E56;
      border: 1px solid #9ECFC6;
      border-radius: 50px;
      padding: 4px 14px;
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 16px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .placeholder h2 {
      color: #3D157D; font-weight: 900; margin: 0 0 10px;
      font-size: 22px;
    }
    .placeholder h2 .dot { color: #30BEAA; }
    .placeholder p { color: #555; margin: 0; font-size: 14px; line-height: 1.5; }
    .mobile-wrap {
      width: 430px; max-width: 430px;
      height: calc(100vh - 80px);
      border: 8px solid #26215C;
      border-radius: 20px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <header class="bar">
    <div class="left"><a class="back" href="./index.html">← Back</a></div>
    <div class="center">
      <div class="logo">doddl<span class="dot">.</span></div>
      <div class="label" style="color: #9ECFC6;">Shop by Category</div>
    </div>
    <div class="right">
      <div class="toggle">
        <button id="btnDesktop" class="active" type="button">Desktop</button>
        <button id="btnMobile" type="button">Mobile</button>
      </div>
      <div class="meta" id="meta">Desktop: 1440px</div>
    </div>
  </header>
  <div class="stage" id="stage"></div>
  <script>
    (function () {
      var stage = document.getElementById('stage');
      var meta = document.getElementById('meta');
      var btnD = document.getElementById('btnDesktop');
      var btnM = document.getElementById('btnMobile');
      var placeholderHTML =
        '<div class="placeholder">' +
          '<span class="badge">Shop by Category</span>' +
          '<h2>Storyboard coming soon<span class="dot">.</span></h2>' +
          '<p>Shop by Category — storyboard coming soon. Wireframes in progress; this view will mirror the Shop by Stage layout adapted to product-type discovery.</p>' +
        '</div>';
      function setMode(mode) {
        if (mode === 'desktop') {
          stage.innerHTML = placeholderHTML;
          btnD.classList.add('active'); btnM.classList.remove('active');
          meta.textContent = 'Desktop: 1440px';
        } else {
          stage.innerHTML = '<div class="mobile-wrap">' + placeholderHTML + '</div>';
          btnD.classList.remove('active'); btnM.classList.add('active');
          meta.textContent = 'Mobile: 390px';
        }
      }
      setMode('desktop');
      btnD.addEventListener('click', function () { setMode('desktop'); });
      btnM.addEventListener('click', function () { setMode('mobile'); });
    })();
  </script>
</body>
</html>
